<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Bandeira CSS</title>

  <style>

    body {
      margin: 0;
      border: solid black 12px;
    }

    .green-box {
      height: 150px;
      width: 700px;
      background-color: rgb(30, 181, 58);
    }

    .white-box {
      height: 150px;
      width: 700px;
      background-color: #fff;
    }

    .blue-box {
      height: 150px;
      width: 700px;
      background-color: rgb(0, 114, 198);
    }

  </style>
</head>

<body>

  <div class="green-box"></div>
  <div class="white-box"></div>
  <div class="blue-box"></div>

</body>

</html>
