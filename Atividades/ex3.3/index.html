<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    
    /* Escreva seu CSS dentro da tag Style! */

    .blue-box{
        margin-top: 200px;
        margin-left: 200px;
        height: 300px;
        width: 500px;
      background-color: blue;
    }

    .red-circle{
        position: relative;
      margin-left: 250px;
      top: 150px;
      background-color: red;
      width: 200px;
      height: 200px;
      border-radius: 50%;
    }
    
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
